# CONDUCTOR → merges into nervous--govern (unique parts) + isotopes dissolve
nervous--orchestrate:
  state: PLANNED
  absorbs_from:
    - tool-interaction-design/conductor/session.py      # 600 lines — FRAME/SHAPE/BUILD/PROVE lifecycle (UNIQUE)
    - tool-interaction-design/conductor/oracle.py        # 1200 lines — contextual advisories (UNIQUE)
    - tool-interaction-design/conductor/guardian.py       # 200 lines — wisdom enrichment (UNIQUE)
    - tool-interaction-design/conductor/patchbay.py      # 500 lines — layer composition (UNIQUE)
    - tool-interaction-design/conductor/executor.py      # 400 lines — workflow DSL (UNIQUE)
    - tool-interaction-design/conductor/fleet*.py        # 1050 lines — agent fleet management (UNIQUE)
    - tool-interaction-design/conductor/cross_verify.py  # 200 lines — agent output verification (UNIQUE)
    - tool-interaction-design/conductor/handoff.py       # 300 lines — agent handoff (UNIQUE)
    - tool-interaction-design/conductor/observability.py # 300 lines — structured event logging (UNIQUE)
    - tool-interaction-design/conductor/policy.py        # 200 lines — policy bundles (UNIQUE)
    - tool-interaction-design/conductor/commands/        # 1500 lines — CLI
    - tool-interaction-design/exports/                   # 2000 lines — MCP server export
  verb: orchestrate
  signal_inputs: [TRACE, REPORT, STATE, CONSTRAINT]
  signal_outputs: [DIRECTIVE, CONSTRAINT, STATE]
  isotopes_dissolved:
    - conductor/governance.py → USE nervous--govern/governance (engine's version)
    - conductor/constants.py::ORGANS → USE skeletal--define/organ_config
    - conductor/schemas.py → USE skeletal--define/schemas
    - conductor/workqueue.py → MERGE with digestive--measure (overlaps deadlines/irf)

# VOX (voice governance) → unique, gets own cocoon
immune--score:
  state: PLANNED
  absorbs_from:
    - vox--architectura-gubernatio/   # 4100 lines — Python voice scorer
    - vox--publica/                   # 1300 lines — TypeScript port (ISOTOPE of Python version)
  verb: score
  signal_inputs: [SOURCE, KNOWLEDGE, AESTHETIC]
  signal_outputs: [VALIDATION, REPORT]
  isotopes_to_resolve:
    - vox--publica IS a TypeScript port of vox--architectura-gubernatio
    - Keep both: Python for internal use, TypeScript for Cloudflare deployment

# AGENTIC-TITAN → product (94,700 lines, too large for a function)
muscular--titan:
  state: PLANNED
  absorbs_from:
    - agentic-titan/                  # 94700 lines — full agent framework
  verb: agent
  signal_inputs: [CONTRACT, DIRECTIVE, STATE]
  signal_outputs: [TRACE, REPORT, SYNTHESIS]
  note: >
    This is the largest single codebase. It is a PRODUCT (carries assets,
    has its own API, dashboard, runtime deployment). During molt, it stays
    as a product directory. Its internal structure is its own business.

# AGENT-CLAUDE-SMITH → separate agent orchestrator (TypeScript)
muscular--smith:
  state: PLANNED
  absorbs_from:
    - agent--claude-smith/            # 6300 lines TypeScript — Claude-specific agent orchestrator
  verb: smith
  signal_inputs: [DIRECTIVE, CONTRACT]
  signal_outputs: [TRACE, REPORT]

# CONTRIBUTION ENGINE → unique, gets own cocoon
circulatory--contribute:
  state: PLANNED
  absorbs_from:
    - orchestration-start-here/contrib_engine/  # ~2800 lines — contribution scanning, campaign, outreach
  verb: contribute
  signal_inputs: [KNOWLEDGE, DIRECTIVE]
  signal_outputs: [TRACE, REPORT, SOURCE]
  isotopes_dissolved:
    - orchestration-start-here/scripts/validate-deps.py → USE nervous--govern (engine's dep graph)
    - orchestration-start-here/scripts/calculate-metrics.py → USE digestive--measure (engine's metrics)
    - orchestration-start-here/scripts/organ-audit.py → USE immune--verify (engine's audit)
    - orchestration-start-here/scripts/validate-all-seeds.py → USE circulatory--route (engine's seed validator)
    - orchestration-start-here/scripts/generate-seed-from-registry.py → USE reproductive--generate

# MATERIA-COLLIDER → product (film database)
digestive--collider:
  state: PLANNED
  absorbs_from:
    - materia-collider/               # 1500 lines — film scrubbing database
  verb: collide
  signal_inputs: [SOURCE]
  signal_outputs: [KNOWLEDGE, ARCHIVE]
  note: Product — carries video/film assets.

# VIGILES → unique methodology, gets own cocoon
immune--watch:
  state: PLANNED
  absorbs_from:
    - vigiles-aeternae--agon-cosmogonicum/  # 1600 lines — mythological audit engine
  verb: watch
  signal_inputs: [STATE, KNOWLEDGE, ARCHIVE]
  signal_outputs: [REPORT, VALIDATION, QUESTION]
  note: NOT an isotope of engine audit. Uses fundamentally different methodology.

# CORPUS SCRIPTS → isotopes dissolved into engine cocoons
# organvm-corpvs-testamentvm/scripts/ (13,900 lines of standalone scripts)
# DISSOLVED — each script absorbed by the engine cocoon that owns its function:
#   calculate-metrics.py → digestive--measure
#   organ-audit.py → immune--verify
#   generate-seed-yaml.py → reproductive--generate
#   convergence-validate.py → immune--verify
#   The docs (400K+ words) → memory--remember (constitutional corpus)

# UNIVERSAL-NODE-NETWORK → absorbs into circulatory--route
# 1700 lines of inter-organ messaging — same domain as dispatch + seed graph
# Unique part: homeostasis monitor (507 lines) → endocrine--regulate

# SMALL REPOS → dissolved
# petasum-super-petasum (350 lines) → ISOTOPE of engine governance → dissolved
# system-governance-framework (200 lines) → INCOMPATIBLE state machine → dissolved, states reconciled
# collective-persona-operations (400 lines) → small, absorbs into muscular--titan (persona management)
# reverse-engine-recursive-run (880 lines) → absorbs into immune--verify (security analysis)
# a-i--skills → NOT CODE, skill bundles stay as reference → skeletal--skills/ (if kept)

