# circulatory--relay.yaml — formation gate contract

identity:
  name: circulatory--relay
  mechanism: circulatory
  verb: relay
  signal_inputs: [TRACE, STATE]
  signal_outputs: [TRACE, VALIDATION]

sources:
  - repo: meta-organvm/organvm-engine
    modules: [src/organvm_engine/pulse/nerve.py]
    note: "Asynchronous signal relay implementation"

gate:
  - id: G1
    check: ASYNC_DISPATCH
    condition: "Ensures signal dispatch does not block producing function execution"
    status: PENDING

  - id: G2
    check: LINEAGE_PRESERVATION
    condition: "Relayed signals maintain their provenance traces across asynchronous boundaries"
    status: PENDING

  - id: G3
    check: HANDSHAKE_ENVELOPE
    condition: "NRV-005 + GEN-004 — the relay surface and AGENTS routing surface complete one handoff handshake: RELAY says what was completed, what is next, and the active boundary; AGENTS says which agent is allowed to take that next work"
    status: PENDING

  - id: G4
    check: TWO_PASS_CLOSE
    condition: "relay handoff includes a mandatory second verification pass — first pass inventories and commits, second pass audits the first pass output for stale counts, missed indices, and unchecked vacuums; single-pass closure is treated as incomplete"
    status: PENDING

dna:
  - "NerveBundle subscription indexing — fast O(1) lookup by event type and subscriber (nerve.py, tested)"
  - "Subscription resolution from seed.yaml — walks all seeds, collects event subscriptions, builds dispatch graph"
  - "Source pattern matching — supports exact, prefix-wildcard, and catch-all patterns for event routing"
  - "Propagation engine — matches events against subscriptions and generates dispatch records with provenance"

defect:
  - "No async runtime — nerve.py is synchronous despite contract requiring non-blocking dispatch (G1)"
  - "No provenance preservation across relay boundaries — subscriptions carry identity but not trace chains"
  - "Handshake envelope (G3) has no implementation — no RELAY-to-AGENTS routing surface exists in engine"

state: CALLING
