# signal-graph.yaml — the organism's wiring diagram
#
# Created with the FIRST function (SEED §II, Step 5).
# Python naming convention (GEN-002): canonical '--' maps to '_' in .py filenames.
#   skeletal--define → skeletal_define.py
#   circulatory--route → circulatory_route.py
#   cultvra--logos → cultvra_logos.py

signal_types:
  QUERY:
    description: "a request for specific structural information"
    discovered_by: skeletal--define

  KNOWLEDGE:
    description: "structured metadata about the organism's composition"
    discovered_by: skeletal--define

  TRACE:
    description: "temporal observation recording what was found, what changed, what decayed"
    discovered_by: skeletal--define

  CONTRACT:
    description: "a declared behavioral agreement between organism functions — gate contracts, signal signatures, formation pledges"
    discovered_by: circulatory--route

  STATE:
    description: "the current configuration of the organism's elements at a point in time — routing tables, connection maps, defect inventories"
    discovered_by: circulatory--route

  REPORT:
    description: "a structured finding about the organism's health — errors, warnings, informational observations across 4 dimensions (structural, temporal, governance, coherence)"
    discovered_by: immune--verify

  VALIDATION:
    description: "a pass/fail verdict on a specific integrity check — the immune system's judgment on whether an aspect of the organism is internally consistent"
    discovered_by: immune--verify

functions:
  skeletal--define:
    inputs: [QUERY]
    outputs: [KNOWLEDGE, TRACE]
    mechanism: skeletal
    temporal_mode: on-demand
    ontological_type: Capability
    traceability:
      upward: "A1 + A3 + A4: the organism has no way to read its own structure or observe its change over time"
      downward: "mechanism metadata dicts (KNOWLEDGE) + timestamped observation snapshots (TRACE) persisted to observations.jsonl"

  circulatory--route:
    inputs: [CONTRACT, STATE, TRACE]
    outputs: [TRACE, CONTRACT, STATE]
    mechanism: circulatory
    temporal_mode: on-demand
    ontological_type: Capability
    traceability:
      upward: "A2 + A3: the organism can read its structure (skeletal) but has no way to compute what flows between its parts, what could flow, or what is broken"
      downward: "routing tables (STATE) + signal attraction candidates (CONTRACT) + defect inventories (STATE) + routing snapshots persisted to routes.jsonl (TRACE)"

  cultvra--logos:
    inputs: [KNOWLEDGE, STATE, TRACE]
    outputs: [QUERY, TRACE]
    mechanism: cultvra
    temporal_mode: on-demand
    ontological_type: Capability
    traceability:
      upward: "A3 + A7: the organism must persist (A3) and serve the operator (A7) — an organism that cannot describe itself cannot be operated"
      downward: "documentation state inventory (docs.jsonl) + QUERY signals for documentation gaps + README.md as bootstrap artifact"

  immune--verify:
    inputs: [TRACE, STATE, CONTRACT, KNOWLEDGE]
    outputs: [REPORT, VALIDATION]
    mechanism: immune
    temporal_mode: on-demand
    ontological_type: Capability
    traceability:
      upward: "A3 + A5: the organism must persist (A3) and maintain integrity (A5) — an organism that cannot detect its own inconsistencies cannot self-correct"
      downward: "verification reports (verifications.jsonl) + VALIDATION signals (pass/fail per check) + REPORT signals (findings with severity)"

edges:
  dependency: []
  information:
    - from: skeletal--define
      to: circulatory--route
      signal: KNOWLEDGE
      direction: feedfront
      rationale: "the router reads the structure that the skeleton defines — signal-graph.yaml is KNOWLEDGE output consumed as routing input"
    - from: skeletal--define
      to: cultvra--logos
      signal: KNOWLEDGE
      direction: feedfront
      rationale: "the documenter reads the structure to describe the organism"
    - from: circulatory--route
      to: cultvra--logos
      signal: STATE
      direction: feedfront
      rationale: "the documenter reads the routing state to know what flows and what is broken"
    - from: cultvra--logos
      to: skeletal--define
      signal: QUERY
      direction: feedback
      rationale: "documentation gaps become structural queries — what is undocumented? what is stale?"
    - from: skeletal--define
      to: immune--verify
      signal: KNOWLEDGE
      direction: feedfront
      rationale: "the verifier reads the structure to check consistency"
    - from: circulatory--route
      to: immune--verify
      signal: STATE
      direction: feedfront
      rationale: "the verifier reads routing state to check signal flow health"
    - from: immune--verify
      to: skeletal--define
      signal: REPORT
      direction: feedback
      rationale: "verification findings become structural queries — what is broken? what is inconsistent?"
  governance: []
  evolution: []

products:
  signal-propagation-proof:
    timestamp: "2026-04-19"
    description: "Integration test proving end-to-end signal flow: skeletal(KNOWLEDGE) → circulatory(STATE) → cultvra(QUERY) → skeletal(feedback)"
    test_file: test_signal_propagation.py
    assertions: 9
    chain: [skeletal--define, circulatory--route, cultvra--logos]
    signals_verified: [KNOWLEDGE, STATE, QUERY, TRACE, CONTRACT]
    feedback_loop: "cultvra→skeletal via QUERY (documentation gaps become structural queries)"

boundary_signals:
  - name: pyyaml
    type: EXTERNAL
    source: "PyPI: pyyaml"
    direction: inbound
    consumed_by: skeletal--define

  - name: pyyaml
    type: EXTERNAL
    source: "PyPI: pyyaml"
    direction: inbound
    consumed_by: circulatory--route

  - name: pyyaml
    type: EXTERNAL
    source: "PyPI: pyyaml"
    direction: inbound
    consumed_by: cultvra--logos
