# nervous--govern.yaml — formation gate contract
# The repo doesn't move. This contract CALLS it.
# When all gates pass, the formation emerges.

identity:
  name: nervous--govern
  mechanism: nervous
  verb: govern
  signal_inputs: [TRACE, REPORT, STATE, VALIDATION]
  signal_outputs: [RULE, STATE, VALIDATION, CONSTRAINT]

sources:
  - repo: meta-organvm/organvm-engine
    modules: [governance/, coordination/]
    lines: 10500
  - repo: meta-organvm/organvm-ontologia
    modules: [governance/]
    lines: 365
  - repo: organvm-iv-taxis/tool-interaction-design
    modules: [conductor/governance.py]
    lines: 700
    isotope: true
    resolution: dissolve — import from canonical engine governance

gate:
  - id: G1
    check: ISOTOPES_RESOLVED
    condition: "NRV-001 — conductor/governance.py imports from engine governance, not reimplements; the duplicate governance surface is swallowed into the canonical engine"
    status: PENDING

  - id: G1b
    check: INDEX_CANONICALIZED
    condition: "NRV-004 — the old taxis conductor board folds into the a-organvm index; planning/governance work is tracked in one canonical surface, not two parallel boards"
    status: PENDING
    note: "Same act as G1 on a different substrate: code duplicate swallowed by canonical governance, board duplicate swallowed by canonical index"

  - id: G2
    check: SIGNAL_DECLARED
    condition: "signal_inputs and signal_outputs match actual imports/exports"
    status: PENDING

  - id: G3
    check: TESTS_PASS
    condition: "all governance + coordination tests pass after consolidation"
    status: PENDING

  - id: G4
    check: NO_PROHIBITED_COUPLING
    condition: "no memory function emitting RULE as canonical authority"
    status: PENDING

  - id: G5
    check: TRACEABILITY
    condition: "upward trace to A6 (organizational closure) stated"
    status: PENDING

dna:
  - governance/ — promotion state machine (LOCAL→CANDIDATE→PUBLIC_PROCESS→GRADUATED→ARCHIVED)
  - governance/dependency_graph.py — unidirectional flow enforcement (I→II→III)
  - governance/audit.py — blast-radius impact analysis
  - coordination/ — multi-agent claims registry (punch-in/out), tool checkout line
  - governance-rules.json — codified dependency rules + promotion constraints

defect:
  - conductor/governance.py was isotope — MUST import from engine canonical
  - tool-interaction-design conductor board duplicates a-organvm index (NRV-004/G1b)
  - governance tests assume V1 organ structure — may need updating for V2

state: CALLING
