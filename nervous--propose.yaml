# nervous--propose.yaml — proposal-order formation gate contract

identity:
  name: nervous--propose
  mechanism: nervous
  verb: propose
  signal_inputs: [RULE, KNOWLEDGE, TRACE, QUESTION]
  signal_outputs: [RULE, CONTRACT, TRACE, QUESTION]

sources:
  - repo: meta-organvm/praxis-perpetua
    modules: [commissions/inquiry-log.yaml]
    note: "Existing inbox for commissioned thought and unresolved needs"
  - repo: meta-organvm/organvm-corpvs-testamentvm
    modules: [INST-INDEX-RERUM-FACIENDARUM.md, specs/SPEC-008.md]
    note: "Universal work registry + constrained-extension impact assessment law"

gate:
  - id: G1
    check: WHOLE_PACKET_INTAKE
    condition: "Proposal inbox accepts the whole submission packet: raw suggestion, origin context, implicated rules/laws, and intended object of change (Ref: IRF-SYS-039)"
    status: PENDING

  - id: G2
    check: IMPACT_DISPOSITIONS
    condition: "Each proposal derives an impact assessment over downstream artifacts using SPEC-008 dispositions: Compatible / Requires update / Unaffected"
    status: PENDING

  - id: G3
    check: SHARD_EXTRACTION
    condition: "Inbox emits reusable shards: local amendment, cross-cocoon implication, index update, and doctrine fragment that may apply elsewhere"
    status: PENDING

  - id: G4
    check: CONTEXT_DEFICIT_OUTPUT
    condition: "When enactment is underspecified, the inbox emits post-derivation context deficits as explicit questions instead of dropping the proposal or pretending closure"
    status: PENDING

dna:
  - "inquiry-log.yaml — structured commission tracking with id/title/tier/faculty/status/needs/evidence (2+ active commissions)"
  - "INST-INDEX-RERUM-FACIENDARUM.md — 1,408-line universal work registry with IRF-prefixed items, priority, domain, status"
  - "SPEC-008 Evolution & Migration Law — formal impact dispositions: Compatible / Requires update / Unaffected"
  - "IRF parser + query (engine) — typed parsing of the work registry into filterable IRFItem objects (tested)"

defect:
  - "No proposal inbox exists — inquiry-log.yaml tracks commissions but has no submission intake mechanism"
  - "SPEC-008 dispositions exist as spec text but no automated impact assessment code implements them"
  - "Shard extraction (G3) is pure design — no code emits reusable amendment/implication/doctrine fragments"
  - "Context deficit output (G4) — no mechanism detects underspecification or emits explicit questions"

state: CALLING
