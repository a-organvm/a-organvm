# poiesis--architect.yaml — formation gate contract

identity:
  name: poiesis--architect
  mechanism: poiesis
  verb: architect
  signal_inputs: [CONTRACT, RULE]
  signal_outputs: [STATE, TRACE]

sources:
  - repo: meta-organvm/organvm-engine
    modules: [palingenesis.md]
    note: "Modular synthesis v3 spec"

gate:
  - id: G1
    check: PYTHON_PACKAGING
    condition: "Design Python import patterns for {system}--{function} flat namespace (Ref: IRF-SYS-035)"
    status: PENDING

  - id: G2
    check: GIT_SUPERPROJECT
    condition: "Design git architecture for a-organvm/ instance root (Ref: IRF-SYS-036)"
    status: PENDING

dna:
  - "distillatio/probatio.py — language-aware packaging physics (LANGUAGE_PHYSICS dict with 7 patterns)"
  - "detect_language() — auto-detection of Python src/flat, Next.js app/src, TypeScript, JVM, Rust, docs"
  - "Palingenesis v3 spec (if present) — modular synthesis architecture design with 6 proofs"

defect:
  - "Source listed as 'palingenesis.md' but file existence unverified in engine root — may be a plan file, not code"
  - "Python packaging pattern (G1) for {system}--{function} flat namespace has no implementation"
  - "Git superproject architecture (G2) for a-organvm/ instance root has no implementation"
  - "probatio.py measures existing depth but does not prescribe or generate new packaging structures"

state: CALLING
