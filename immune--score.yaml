# immune--score.yaml — formation gate contract

identity:
  name: immune--score
  mechanism: immune
  verb: score
  signal_inputs: [SOURCE, KNOWLEDGE, AESTHETIC]
  signal_outputs: [VALIDATION, REPORT]

sources:
  - repo: organvm-iv-taxis/vox--architectura-gubernatio
    modules: [src/vox/]
    lines: 4100
  - repo: organvm-iv-taxis/vox--publica
    modules: [src/]
    lines: 1300
    isotope: true
    resolution: keep both — Python for internal, TypeScript for Cloudflare

gate:
  - id: G1
    check: TESTS_PASS
    condition: "vox test suite passes"
    status: PENDING

  - id: G2
    check: SIGNAL_DECLARED
    condition: "AESTHETIC input type defined — vox scores against voice/style constraints"
    status: PENDING

dna:
  - HeuristicScorer with 4-dimensional voice scoring (structural_architecture, rhetorical_signature, register_integrity, signal_density) — weighted 30/30/20/20
  - 11 anti-pattern rules (AP-01 through AP-11) + 8 invariant rules (INV-01 through INV-08) — configurable via StyleSheet
  - textstat integration for readability metrics grounded in established NLP
  - TypeScript port (vox--publica) for Cloudflare edge deployment — deliberate dual-stack, not accidental isotope
  - Corpus ingestion, deep analysis, diff tracking, worksheet delta — full voice governance lifecycle

defect:
  - Python and TypeScript implementations could drift — no cross-language conformance test proving they produce identical scores
  - AESTHETIC signal input type not yet defined (G2 PENDING) — vox scores against voice rules but the aesthetic constraint integration is unspecified
  - Formalizer module exists but assessment pending on whether formalization is tested or aspirational
  - 4100 lines in Python scorer is large for a heuristic system — may contain over-engineered rule infrastructure

state: CALLING
