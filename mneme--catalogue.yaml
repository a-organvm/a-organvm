    check: RERUM_SYNC
    condition: "Build INST-INDEX-RERUM.md — ontological inventory of every artifact, its type, and state (Ref: IRF-IDX-003)"
    status: PENDING

dna:
  - Clear mandate: build 3 canonical indices (Locorum, Nominum, Rerum) from live system state
  - Index Locorum = spatial map of all repos/directories/infrastructure — grounded in filesystem reality
  - Index Nominum = registry of all 8 mechanisms and 117 named entities — grounded in registry-v2.json
  - Index Rerum = ontological inventory of every artifact, type, and state — grounded in seed.yaml contracts

defect:
