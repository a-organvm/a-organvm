  - Source is a single markdown file (INST-INDEX-LOCORUM.md) — no scripts, no generation logic, no tests
  - No declared line count for code — this is a documentation cocoon masquerading as a formation
  - Risk of manual maintenance burden if indices are not auto-generated from engine/registry data

state: CALLING
